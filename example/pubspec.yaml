name: chat_flutter_example
description: "Demo app for the chat_flutter package."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  chat_flutter:
    path: ../
  go_router: ^15.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

dependency_overrides:
  # record_linux 0.7.2 is missing startStream (added in record_platform_interface 1.4.0).
  # Use local stub that adds the missing method.
  record_linux:
    path: ../record_linux_stub
