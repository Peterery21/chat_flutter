name: chat_flutter
description: "A reusable Flutter chat package — integrates with chat-api (Spring Boot). Supports 1:1, group chats, AI bots, WebSocket STOMP real-time."
version: 0.1.0
homepage: https://github.com/kodzotech/chat_flutter

environment:
  sdk: ^3.11.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.5

  # HTTP & WebSocket
  dio: ^5.8.0
  stomp_dart_client: ^2.0.0

  # Navigation
  go_router: ^15.0.0

  # Dependency injection
  get_it: ^8.0.2
  injectable: ^2.5.0

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI utilities
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  flutter_secure_storage: ^9.2.4
  visibility_detector: ^0.4.0+2
  emoji_picker_flutter: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.8
  json_serializable: ^6.9.0
  injectable_generator: ^2.7.0
  mocktail: ^1.0.4

flutter:
