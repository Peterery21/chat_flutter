name: chat_flutter
description: "A reusable Flutter chat package — integrates with chat-api (Spring Boot). Supports 1:1, group chats, AI bots, WebSocket STOMP real-time."
version: 0.1.1
homepage: https://github.com/kodzotech/chat_flutter

environment:
  sdk: ^3.11.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.5

  # HTTP & WebSocket
  dio: ^5.8.0
  stomp_dart_client: ^2.0.0

  # Navigation
  go_router: ^16.1.0

  # Dependency injection
  get_it: ^8.0.2
  injectable: ^2.5.0

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # UI utilities
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  flutter_secure_storage: ^9.2.4
  visibility_detector: ^0.4.0+2
  emoji_picker_flutter: ^3.1.0

  # Sharing
  share_plus: ^12.0.0

  # Media recording & playback
  record: ">=5.0.0 <5.2.0"
  audioplayers: ^6.4.0
  video_player: ^2.9.2
  path_provider: ^2.1.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^3.0.6
  json_serializable: ^6.9.0
  injectable_generator: ^2.7.0
  mocktail: ^1.0.4

dependency_overrides:
  # record 5.x requires record_linux <1.0.0, but record_linux 0.7.2 doesn't implement
  # startStream (added in record_platform_interface 1.4.0+). Force the newer implementations.
  record_linux: 1.3.0
  record_platform_interface: 1.5.0

flutter:
